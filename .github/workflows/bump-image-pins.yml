name: bump-image-pins

# Bumps the version pins embedded in the image build matrices (torch/
# torchvision, TensorFlow, code-server) that Dependabot can't see, and opens a
# review PR. The PR's path-filtered image builds run validate-only (no publish),
# so a bad wheel/version combination is caught before merge. See issue #875.
#
# Requires the repo/org setting "Allow GitHub Actions to create and approve pull
# requests" to be enabled so the workflow's GITHUB_TOKEN can open the PR.

on:
  workflow_dispatch:
  schedule:
    - cron: '27 5 * * 1'

concurrency:
  group: bump-image-pins
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump pins
        id: bump
        run: python3 scripts/bump-image-pins.py

      - name: Open pull request
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bump/image-pins
          delete-branch: true
          title: 'images: bump build-matrix version pins'
          commit-message: 'images: bump build-matrix version pins'
          body: |
            Automated bump of the version pins embedded in the image build
            matrices (torch/torchvision, TensorFlow, code-server).

            ${{ steps.bump.outputs.summary }}

            **Review before merge.** The path-filtered image builds on this PR
            run validate-only (no publish) — confirm they pass, and sanity-check
            the torch/torchvision pairing, before merging. Merging to `main`
            republishes the affected `ghcr.io/labpod/*` tags.

            Opened by the `bump-image-pins` workflow (issue #875).
          labels: automated, images
