name: build-pytorch-images

# Builds the LabPod PyTorch + JupyterLab composite image across the CUDA
# tag matrix and pushes to ghcr.io/labpod/pytorch-jupyter:<tag>.
#
# Auth: this repo lives in the LabPod org, so the workflow's own
# GITHUB_TOKEN has packages:write for ghcr.io/labpod/* — no PAT needed.
#
# First run only: the created package is private by default. In the
# package settings set visibility to Public (LabPod workspaces pull
# anonymously) and link it to this repository. LabPod's default pull
# allowlist already covers ghcr.io/labpod.
#
# Rebuilds on: manual dispatch, image/workflow changes in pull requests
# and on main, and a weekly schedule to pick up torch / base-image security
# updates. Pull-request builds validate only; they never publish an image.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'images/pytorch-jupyter/**'
      - '.github/workflows/build-pytorch-images.yml'
  push:
    branches: [main]
    paths:
      - 'images/pytorch-jupyter/**'
      - '.github/workflows/build-pytorch-images.yml'
  schedule:
    - cron: '17 4 * * 1'

concurrency:
  group: build-pytorch-images
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: cu121
            base: docker.io/nvidia/cuda:12.1.1-runtime-ubuntu22.04
            torch_cuda: cu121
            torch: 2.5.1
            torchvision: 0.20.1
          - tag: cu126
            base: docker.io/nvidia/cuda:12.6.3-runtime-ubuntu24.04
            torch_cuda: cu126
            torch: 2.8.0
            torchvision: 0.23.0
          - tag: cu129
            base: docker.io/nvidia/cuda:12.9.1-runtime-ubuntu24.04
            torch_cuda: cu129
            torch: 2.8.0
            torchvision: 0.23.0
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: images/pytorch-jupyter
          file: images/pytorch-jupyter/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          provenance: false
          tags: ghcr.io/labpod/pytorch-jupyter:${{ matrix.tag }}
          build-args: |
            CUDA_BASE_IMAGE=${{ matrix.base }}
            TORCH_CUDA=${{ matrix.torch_cuda }}
            TORCH_VERSION=${{ matrix.torch }}
            TORCHVISION_VERSION=${{ matrix.torchvision }}
