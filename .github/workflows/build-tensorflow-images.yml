name: build-tensorflow-images

# Builds the LabPod TensorFlow + JupyterLab composite image across the CUDA
# tag matrix and pushes to ghcr.io/labpod/tensorflow-jupyter:<tag>.
#
# Auth: this repo lives in the LabPod org, so the workflow's own
# GITHUB_TOKEN has packages:write for ghcr.io/labpod/* — no PAT needed.
#
# First run only: the created package is private by default. In the
# package settings set visibility to Public (LabPod workspaces pull
# anonymously) and link it to this repository. LabPod's default pull
# allowlist already covers ghcr.io/labpod.
#
# Rebuilds on: manual dispatch, image/workflow changes in pull requests
# and on main, and a weekly schedule to pick up TensorFlow / base-image
# security updates. Pull-request builds validate only; they never publish
# an image.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'images/tensorflow-jupyter/**'
      - '.github/workflows/build-tensorflow-images.yml'
  push:
    branches: [main]
    paths:
      - 'images/tensorflow-jupyter/**'
      - '.github/workflows/build-tensorflow-images.yml'
  schedule:
    - cron: '37 4 * * 1'

concurrency:
  group: build-tensorflow-images
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: cu125
            base: docker.io/nvidia/cuda:12.5.1-runtime-ubuntu24.04
            tf_version: 2.21.0
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and optionally push
        uses: docker/build-push-action@v7
        with:
          context: images/tensorflow-jupyter
          file: images/tensorflow-jupyter/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          provenance: false
          tags: ghcr.io/labpod/tensorflow-jupyter:${{ matrix.tag }}
          build-args: |
            CUDA_BASE_IMAGE=${{ matrix.base }}
            TF_VERSION=${{ matrix.tf_version }}
